<!-- Prevent auto-scroll restoration on client-side JSX render -->
<script>
  // ブラウザのスクロール位置自動復元を無効化（Client-side JSX による遅延レンダリング対策）
  // 初回アクセス時の中段ジャンプを防ぐ。リロード時は自然なブラウザ挙動に任せる。
  if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
  }
  // React レンダリング完了後に scroll-behavior:smooth を有効化
  // (初回ロード時は base.css で auto。アンカーリンクのスムーズスクロールはレンダリング後に有効)
  window.addEventListener('load', function () {
    setTimeout(function () {
      document.documentElement.style.scrollBehavior = 'smooth';
      document.body.style.scrollBehavior = 'smooth';
    }, 1000);
  });
</script>
